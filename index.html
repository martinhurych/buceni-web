<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUCENI</title>
  <style>
    :root {
      --menu-bg: rgba(0, 0, 0, 0.88);
      --menu-text: #f6db1f;
      --menu-line: rgba(246, 219, 31, 0.32);
      --tile-size: 520px;
      --white: #f1f1f1;
      --yellow: #f6db1f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @view-transition { navigation: none; }
    ::view-transition-old(root), ::view-transition-new(root) { animation: none; }

    html {
      overflow-y: scroll;
      scrollbar-gutter: stable;
    }

    @font-face { font-family: 'Calibre'; src: url('Font/calibre/CalibreRegular.otf') format('opentype'); font-weight: 400; font-style: normal; font-display: block; }
    @font-face { font-family: 'Calibre'; src: url('Font/calibre/CalibreRegularItalic.otf') format('opentype'); font-weight: 400; font-style: italic; font-display: block; }
    @font-face { font-family: 'Calibre'; src: url('Font/calibre/CalibreMedium.otf') format('opentype'); font-weight: 500; font-style: normal; font-display: block; }
    @font-face { font-family: 'Calibre'; src: url('Font/calibre/CalibreSemibold.otf') format('opentype'); font-weight: 600; font-style: normal; font-display: block; }
    @font-face { font-family: 'Calibre'; src: url('Font/calibre/CalibreBold.otf') format('opentype'); font-weight: 700; font-style: normal; font-display: block; }
    @font-face { font-family: 'Calibre'; src: url('Font/calibre/CalibreBlack.otf') format('opentype'); font-weight: 900; font-style: normal; font-display: block; }

    body {
      position: relative;
      min-height: 100vh;
      background: #b8bbba;
      padding: 16px;
      overflow-x: hidden;
      font-family: Calibre, 'Avenir Next', 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .topbar {
      position: relative;
      z-index: 70;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: clamp(72px, 8.2vw, 94px);
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .top-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
      margin-top: 4px;
    }

    .top-nav a {
      color: var(--white);
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: -0.015em;
      font-size: clamp(1.5rem, 2.6vw, 2.2rem);
      line-height: 1;
    }

    .top-nav a:hover {
      color: var(--yellow);
    }

    .home-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: clamp(102px, 10vw, 132px);
      height: auto;
      padding: 0;
      text-decoration: none;
      line-height: 0;
      transition: transform 0.2s ease, filter 0.2s ease;
      flex-shrink: 0;
    }

    .home-cta img {
      display: block;
      width: 100%;
      height: auto;
    }


    .tickets {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: clamp(133px, 13vw, 172px);
      height: auto;
      padding: 0;
      text-decoration: none;
      line-height: 0;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .tickets img {
      display: block;
      width: 100%;
      height: auto;
    }

    .header-logo {
      display: inline-flex;
      align-items: center;
      width: clamp(70px, 7vw, 93px);
      height: auto;
      line-height: 0;
    }

    .header-logo img {
      display: block;
      width: 100%;
      height: auto;
    }

    .header-kravka {
      display: block;
      width: clamp(35px, 3.5vw, 49px);
      height: auto;
      margin-left: -14px;
    }

    .menu-kravka {
      display: none;
    }


    .menu-toggle {
      border: 0;
      background: transparent;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      color: var(--yellow);
      font-family: inherit;
      font-size: clamp(1.5rem, 2.6vw, 2.2rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.015em;
      padding: 0;
      line-height: 1;
    }

    .hero {
      position: relative;
      z-index: 10;
      display: grid;
      justify-items: center;
      min-height: 48vh;
      align-content: start;
      gap: 10px;
      padding-top: 12px;
    }

    .site-header {
      pointer-events: none;
    }

    .site-header img {
      width: min(1064px, 94vw);
      height: auto;
      display: block;
    }

    .artists-tba {
      display: flex;
      justify-content: center;
      width: 100%;
      margin-top: 6px;
    }

    .artists-tba img {
      width: min(540px, 93vw);
      height: auto;
      display: block;
    }

    .site-footer {
      position: relative;
      z-index: 25;
      background: #d1c449;
      margin: 0 -16px -16px;
      padding: 18px 22px 20px;
      font-family: Calibre, 'Avenir Next', 'Segoe UI', Arial, sans-serif;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      align-items: center;
      justify-content: start;
      width: min(760px, 100%);
      margin: 0 auto;
    }

    .main-tickets-cta {
      display: flex;
      justify-content: center;
      padding: clamp(16px, 3vw, 32px) 0;
    }

    .main-tickets-cta img {
      width: min(220px, 60vw);
      height: auto;
      display: block;
    }

    .footer-col {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 20px;
    }

    .site-footer a {
      color: #1f1f1f;
      text-decoration: none;
      text-transform: uppercase;
      font-size: clamp(1.05rem, 1.25vw, 1.35rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      text-shadow: none;
    }

    .site-footer a:hover {
      color: #000000;
    }

    .footer-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.32em;
      margin-top: 11px;
      width: min(760px, 100%);
      margin-left: auto;
      margin-right: auto;
      color: #1f1f1f;
      background: transparent;
      padding: 0;
      font-size: clamp(1.05rem, 1.25vw, 1.35rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      text-transform: uppercase;
    }

    .footer-meta .accent {
      color: #F6DB1F;
    }

    .footer-tickets {
      display: inline-flex;
      align-items: center;
      line-height: 0;
      position: relative;
      left: 10px;
      top: -5px;
    }

    .footer-tickets img {
      width: clamp(72px, 9.6vw, 112px);
      height: auto;
      display: block;
    }

    .menu-panel {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #B8BBBA;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 60;
    }

    .menu-open .menu-panel {
      display: flex;
    }

    .menu-panel nav {
      display: grid;
      gap: 0;
      width: 100%;
      text-align: center;
    }

    .menu-panel a {
      color: #F6DB1F;
      text-decoration: none;
      font-size: clamp(2rem, 6vw, 3.5rem);
      letter-spacing: -0.02em;
      padding: 18px 0 10px;
      border-bottom: 3px solid #A80053;
      text-transform: uppercase;
      font-weight: 800;
    }

    .menu-panel a:hover {
      opacity: 0.7;
    }

    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      opacity: 0;
      pointer-events: none;
      z-index: 55;
    }

    .footer-wrapper {
      position: relative;
    }

    .deco-traktor {
      position: absolute;
      left: -16px;
      bottom: 100%;
      width: min(450px, 39vw);
      height: auto;
      pointer-events: none;
      z-index: 1;
    }

    .menu-open .scrim {
      opacity: 1;
      pointer-events: auto;
    }

    @media (max-width: 900px) {
      :root {
        --tile-size: 420px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 0;
      }

      .topbar-actions {
        display: contents;
      }

      .top-nav {
        display: none;
      }

      .menu-toggle {
        display: inline-flex;
        justify-self: end;
      }

      .hero {
        min-height: 40vh;
      }

      .tickets {
        width: clamp(92px, 22vw, 118px);
      }

      .header-logo {
        display: none;
      }

      .header-kravka {
        display: none;
      }

      .menu-text {
        display: none;
      }

      .menu-logo {
        display: block;
        width: clamp(58px, 14.1vw, 75px);
        height: auto;
      }

      .menu-open .menu-logo {
        display: none;
      }

      .menu-open .menu-kravka {
        display: block;
        width: clamp(37px, 8.9vw, 48px);
        height: auto;
        margin-left: -25px;
      }

      .home-cta {
        width: clamp(92px, 22vw, 118px);
      }

      .main-tickets-cta {
        display: none;
      }
    }

    @media (max-width: 640px) {
      :root {
        --tile-size: 320px;
      }

      body {
        padding: 12px;
      }

      .deco-traktor {
        left: -12px;
      }

      .site-header img {
        width: 96vw;
      }

      .artists-tba img {
        width: min(300px, 82vw);
      }

      .site-footer {
        margin: 0 -12px -12px;
        padding: 16px 14px 16px;
      }

      .footer-grid {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .site-footer a {
        font-size: 0.96rem;
      }

      .footer-meta {
        font-size: 0.96rem;
        margin-top: 12px;
        padding: 0;
      }

      .topbar-actions {
        gap: 8px;
      }

      .tickets {
        width: clamp(84px, 24vw, 104px);
      }

      .header-logo {
        width: clamp(51px, 14.7vw, 64px);
      }

      .home-cta {
        width: clamp(84px, 24vw, 104px);
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="home-cta" href="index.html" aria-label="Domovska stranka">
      <img src="images/Web Symbols + GIF/9HOME.svg" alt="Home">
    </a>

    <nav class="top-nav" aria-label="Primary">
      <a href="#artists">Home</a>
      <a href="#timetable">Program</a>
      <a href="info.html" aria-label="Info" style="position:relative;top:-5px;"><img src="images/Web Symbols + GIF/Info.svg" alt="Info" style="display:block;width:clamp(92px,8.4vw,112px);height:auto;"></a>
      <a href="archive.html">Archive</a>
    </nav>

    <div class="topbar-actions">
      <a class="tickets" href="tickets.html" aria-label="Tickets">
        <img src="images/Web Symbols + GIF/tickets.png" alt="Tickets">
      </a>
      <a class="header-logo" href="index.html" aria-label="Bučení 9">
        <img src="images/Web Symbols + GIF/Buceni-logo.svg" alt="Bučení 9">
      </a>
      <img class="header-kravka" src="images/Web Symbols + GIF/Kravka.svg" alt="">

      <button class="menu-toggle" id="menuToggle" aria-label="Open menu" aria-expanded="false"><span class="menu-text">MENU</span><img class="menu-logo" src="images/Web Symbols + GIF/Buceni-logo.svg" alt=""><img class="menu-kravka" src="images/Web Symbols + GIF/Kravka.svg" alt=""></button>
    </div>
  </div>

  <main class="hero">
    <header class="site-header">
      <img src="images/Web Symbols + GIF/Buceni-main.png" alt="Buceni header">
    </header>
    <div class="artists-tba" aria-hidden="true">
      <img src="images/Web Symbols + GIF/ArtistTimetable_WEB.gif" alt="Artists info">
    </div>
    <div class="main-tickets-cta">
      <a href="tickets.html" aria-label="Tickets">
        <img src="images/Web Symbols + GIF/tickets.png" alt="Tickets">
      </a>
    </div>
  </main>

  <aside class="menu-panel" id="menuPanel" aria-hidden="true">
    <nav>
      <a href="#artists">Home</a>
      <a href="#timetable">Program</a>
      <a href="archive.html">Archive</a>
      <a href="info.html">Info</a>
    </nav>
  </aside>

  <div class="footer-wrapper">
  <img class="deco-traktor" src="images/Web Symbols + GIF/Traktor-cut.svg" alt="">
  <footer class="site-footer" id="contact">
    <div class="footer-grid">
      <div class="footer-col">
        <a href="https://www.instagram.com/prespolnispolek/" target="_blank" rel="noopener">Instagram</a>
        <a href="https://www.facebook.com/events/872892972502435?acontext=%7B%22event_action_history%22%3A[%7B%22surface%22%3A%22search%22%7D%2C%7B%22mechanism%22%3A%22attachment%22%2C%22surface%22%3A%22newsfeed%22%7D]%2C%22ref_notif_type%22%3Anull%7D" target="_blank" rel="noopener">Facebook</a>
        <a href="https://www.youtube.com/watch?v=FqBctNaumyg" target="_blank" rel="noopener">YouTube</a>
        <a href="https://www.prespolni.org/en/info" target="_blank" rel="noopener">Contact</a>
      </div>
    </div>
    <span class="footer-meta">
      <span>31.7. - 1.8.</span><span class="accent">2026</span><a href="https://www.google.com/maps/place/P%C5%99espoln%C3%AD/@49.7714769,16.2159098,622m/data=!3m2!1e3!4b1!4m6!3m5!1s0x470d914beb683bcb:0x8a9102eb16dc626b!8m2!3d49.7714735!4d16.2184901!16s%2Fg%2F11hzwhftxf?entry=ttu&g_ep=EgoyMDI2MDUwNi4wIKXMDSoASAFQAw%3D%3D" target="_blank" rel="noopener">Lubn&#225; u Poli&#269;ky</a><span class="accent">CZ</span><a class="footer-tickets" href="tickets.html" aria-label="Tickets"><img src="images/Web Symbols + GIF/tickets.png" alt="Tickets"></a>
    </span>
  </footer>
  </div>

  <script>
    const body = document.body;
    const toggle = document.getElementById('menuToggle');
    const panel = document.getElementById('menuPanel');
    const scrim = document.getElementById('scrim');

    function setMenu(open) {
      body.classList.toggle('menu-open', open);
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      panel.setAttribute('aria-hidden', open ? 'false' : 'true');
    }

    toggle.addEventListener('click', () => {
      const isOpen = body.classList.contains('menu-open');
      setMenu(!isOpen);
    });

    scrim.addEventListener('click', () => setMenu(false));

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') setMenu(false);
    });

    panel.querySelectorAll('a').forEach((link) => {
      link.addEventListener('click', () => setMenu(false));
    });
  </script>

  <button id="scroll-top" aria-label="Scroll to top" onclick="window.scrollTo({top:0,behavior:'smooth'})"><img src="images/Web Symbols + GIF/sipka_page_up-02.svg" alt="" style="height:auto;"></button>
  <style>
    #scroll-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
    }
    #scroll-top img { width: 8em; }
    #scroll-top.visible { opacity: 1; pointer-events: auto; }
    @media (max-width: 900px) { #scroll-top img { width: 5.3em; } }
  </style>
  <script>
    (function(){
      var btn = document.getElementById('scroll-top');
      window.addEventListener('scroll', function(){ btn.classList.toggle('visible', window.scrollY > 300); }, {passive:true});
    })();
  </script>
</body>
</html>
