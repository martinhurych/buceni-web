<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUCENI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #d7d7d7;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, sans-serif;
    }
    .wrap {
      width: min(760px, 100%);
      display: grid;
      gap: 22px;
    }
    .wrap img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img src="grafika/1080x1350-1.jpg" alt="Buceni poster 1">
    <img src="grafika/1080x1350-2.jpg" alt="Buceni poster 2">
  </main>
</body>
</html>
