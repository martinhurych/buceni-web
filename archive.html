<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUCENI ARCHIVE</title>
  <style>
    :root {
      --menu-bg: rgba(0, 0, 0, 0.88);
      --menu-text: #f6db1f;
      --menu-line: rgba(246, 219, 31, 0.32);
      --white: #f1f1f1;
      --yellow: #f6db1f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #5f659f;
      padding: 16px;
      overflow-x: hidden;
      font-family: Calibre, 'Avenir Next', 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .topbar {
      position: relative;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .top-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
    }

    .top-nav a {
      color: var(--white);
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: -0.015em;
      font-size: clamp(1.5rem, 2.6vw, 2.2rem);
      line-height: 1;
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.45);
    }

    .top-nav a:hover,
    .top-nav a.active {
      color: var(--yellow);
    }

    .home-cta,
    .tickets {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: clamp(102px, 10vw, 132px);
      height: auto;
      padding: 0;
      text-decoration: none;
      line-height: 0;
      transition: transform 0.2s ease, filter 0.2s ease;
      flex-shrink: 0;
    }

    .home-cta img,
    .tickets img {
      display: block;
      width: 100%;
      height: auto;
    }

    .home-cta:hover,
    .tickets:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    .tickets {
      width: clamp(102px, 10vw, 132px);
    }

    .menu-toggle {
      width: 52px;
      height: 52px;
      border: 0;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.62);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      position: relative;
    }

    .menu-toggle span,
    .menu-toggle::before,
    .menu-toggle::after {
      content: '';
      display: block;
      width: 24px;
      height: 3px;
      background: var(--yellow);
      border-radius: 2px;
      transition: transform 0.25s ease, opacity 0.25s ease;
      position: absolute;
    }

    .menu-toggle::before {
      transform: translateY(-8px);
    }

    .menu-toggle::after {
      transform: translateY(8px);
    }

    .menu-open .menu-toggle span {
      opacity: 0;
    }

    .menu-open .menu-toggle::before {
      transform: rotate(45deg);
    }

    .menu-open .menu-toggle::after {
      transform: rotate(-45deg);
    }

    .archive-shell {
      width: min(980px, 100%);
      margin: 8px auto 0;
      display: grid;
      gap: 12px;
    }

    .archive-subtitle {
      color: #f1f1f1;
      font-size: clamp(1rem, 1.2vw, 1.2rem);
      line-height: 1.3;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.32);
      opacity: 0.92;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .archive-edition {
      color: #000000;
      font-family: Calibre, 'Avenir Next', 'Segoe UI', Arial, sans-serif;
      font-size: clamp(1rem, 1.2vw, 1.2rem);
      line-height: 1;
      letter-spacing: -0.015em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 8px;
      width: fit-content;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      height: 44px;
      padding: 0 14px;
      background: #f6db1f;
      border: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .archive-edition span {
      display: block;
      line-height: 1;
      transform: translateY(2px);
    }

    .archive-edition:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .archive-video {
      width: min(980px, 100%);
      display: grid;
      gap: 10px;
    }

    .archive-entry {
      display: grid;
      gap: 10px;
    }

    .archive-entry + .archive-entry {
      margin-top: 10px;
    }

    .archive-video-frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      display: block;
      background: #111;
    }

    .archive-video-link {
      color: #1f1f1f;
      text-decoration: none;
      font-size: clamp(0.9rem, 1vw, 1.02rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      width: fit-content;
    }

    .archive-video-link:hover {
      text-decoration: underline;
      text-underline-offset: 0.12em;
    }

    .site-footer {
      position: relative;
      z-index: 25;
      background: #d1c449;
      margin: auto -16px -16px;
      padding: 18px 22px 20px;
      font-family: Calibre, 'Avenir Next', 'Segoe UI', Arial, sans-serif;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      align-items: center;
      justify-content: start;
      width: min(760px, 100%);
      margin: 0 auto;
    }

    .footer-col {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 20px;
    }

    .site-footer a {
      color: #1f1f1f;
      text-decoration: none;
      text-transform: uppercase;
      font-size: clamp(1.05rem, 1.25vw, 1.35rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      text-shadow: none;
    }

    .site-footer a:hover {
      color: #000000;
    }

    .footer-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.32em;
      margin-top: 16px;
      width: min(760px, 100%);
      margin-left: auto;
      margin-right: auto;
      color: #1f1f1f;
      background: transparent;
      padding: 0;
      font-size: clamp(1.05rem, 1.25vw, 1.35rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      text-transform: uppercase;
    }

    .footer-meta .accent {
      color: #F6DB1F;
    }

    .menu-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: min(320px, 86vw);
      height: 100vh;
      background: var(--menu-bg);
      transform: translateX(100%);
      transition: transform 0.28s ease;
      z-index: 60;
      padding: 84px 22px 24px;
    }

    .menu-open .menu-panel {
      transform: translateX(0);
    }

    .menu-panel nav {
      display: grid;
      gap: 10px;
    }

    .menu-panel a {
      color: var(--menu-text);
      text-decoration: none;
      font-size: 1.2rem;
      letter-spacing: 0.02em;
      padding: 10px 4px;
      border-bottom: 1px solid var(--menu-line);
      text-transform: uppercase;
      font-weight: 600;
    }

    .menu-panel a:hover,
    .menu-panel a.active {
      opacity: 0.85;
    }

    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 55;
    }

    .menu-open .scrim {
      opacity: 1;
      pointer-events: auto;
    }

    @media (max-width: 900px) {
      .top-nav {
        display: none;
      }

      .menu-toggle {
        display: inline-flex;
      }

      .tickets,
      .home-cta {
        width: clamp(92px, 22vw, 118px);
      }

      .tickets {
        width: clamp(92px, 22vw, 118px);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .archive-shell {
        margin-top: 0;
      }

      .site-footer {
        margin: auto -12px -12px;
        padding: 16px 14px 16px;
      }

      .footer-grid {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .site-footer a {
        font-size: 0.96rem;
      }

      .footer-meta {
        font-size: 0.96rem;
        margin-top: 12px;
        padding: 0;
      }

      .topbar-actions {
        gap: 8px;
      }

      .tickets,
      .home-cta {
        width: clamp(84px, 24vw, 104px);
      }

      .tickets {
        width: clamp(84px, 24vw, 104px);
      }
    }
  </style>

  <div class="scrim" id="scrim"></div>

  <script>
    const body = document.body;
    const toggle = document.getElementById('menuToggle');
    const panel = document.getElementById('menuPanel');
    const scrim = document.getElementById('scrim');

    function setMenu(open) {
      body.classList.toggle('menu-open', open);
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      panel.setAttribute('aria-hidden', open ? 'false' : 'true');
    }

    toggle.addEventListener('click', () => {
      const isOpen = body.classList.contains('menu-open');
      setMenu(!isOpen);
    });

    scrim.addEventListener('click', () => setMenu(false));

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') setMenu(false);
    });

    panel.querySelectorAll('a').forEach((link) => {
      link.addEventListener('click', () => setMenu(false));
    });
  </script>
