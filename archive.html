<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUCENI ARCHIVE</title>
  <style>
    :root {
      --menu-bg: rgba(0, 0, 0, 0.88);
      --menu-text: #f6db1f;
      --menu-line: rgba(246, 219, 31, 0.32);
      --white: #f1f1f1;
      --yellow: #f6db1f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @view-transition { navigation: none; }
    ::view-transition-old(root), ::view-transition-new(root) { animation: none; }

    html {
      overflow-y: scroll;
      scrollbar-gutter: stable;
    }

    @font-face { font-family: 'Calibre'; src: url('Font/calibre/CalibreRegular.otf') format('opentype'); font-weight: 400; font-style: normal; font-display: block; }
    @font-face { font-family: 'Calibre'; src: url('Font/calibre/CalibreRegularItalic.otf') format('opentype'); font-weight: 400; font-style: italic; font-display: block; }
    @font-face { font-family: 'Calibre'; src: url('Font/calibre/CalibreMedium.otf') format('opentype'); font-weight: 500; font-style: normal; font-display: block; }
    @font-face { font-family: 'Calibre'; src: url('Font/calibre/CalibreSemibold.otf') format('opentype'); font-weight: 600; font-style: normal; font-display: block; }
    @font-face { font-family: 'Calibre'; src: url('Font/calibre/CalibreBold.otf') format('opentype'); font-weight: 700; font-style: normal; font-display: block; }
    @font-face { font-family: 'Calibre'; src: url('Font/calibre/CalibreBlack.otf') format('opentype'); font-weight: 900; font-style: normal; font-display: block; }

    body {
      min-height: 100vh;
      background: #5f659f;
      padding: 16px;
      overflow-x: hidden;
      font-family: Calibre, 'Avenir Next', 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .topbar {
      position: relative;
      z-index: 70;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: clamp(72px, 8.2vw, 94px);
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .top-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
      margin-top: 4px;
    }

    .top-nav a {
      color: var(--white);
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: -0.015em;
      font-size: clamp(1.5rem, 2.6vw, 2.2rem);
      line-height: 1;
    }

    .top-nav a:hover,
    .top-nav a.active {
      color: var(--yellow);
    }

    .home-cta,
    .tickets {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: clamp(102px, 10vw, 132px);
      height: auto;
      padding: 0;
      text-decoration: none;
      line-height: 0;
      transition: transform 0.2s ease, filter 0.2s ease;
      flex-shrink: 0;
    }

    .home-cta img,
    .tickets img {
      display: block;
      width: 100%;
      height: auto;
    }


    .tickets {
      width: clamp(133px, 13vw, 172px);
    }

    .header-logo {
      display: inline-flex;
      align-items: center;
      width: clamp(70px, 7vw, 93px);
      height: auto;
      line-height: 0;
    }

    .header-logo img {
      display: block;
      width: 100%;
      height: auto;
    }

    .header-kravka {
      display: block;
      width: clamp(35px, 3.5vw, 49px);
      height: auto;
      margin-left: -14px;
    }

    .menu-kravka {
      display: none;
    }

    .menu-toggle {
      border: 0;
      background: transparent;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      color: var(--yellow);
      font-family: inherit;
      font-size: clamp(1.5rem, 2.6vw, 2.2rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.015em;
      padding: 0;
      line-height: 1;
    }

    .archive-shell {
      width: min(980px, 100%);
      margin: 8px auto 0;
      display: grid;
      gap: 12px;
    }

    .archive-intro-img {
      display: block;
      width: min(1064px, 100%);
      height: auto;
      margin: 0 auto 8px;
    }

    .archive-subtitle {
      color: #f1f1f1;
      margin-top: 20px;
      font-size: clamp(1.2rem, 1.8vw, 1.9rem);
      line-height: 1.3;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.32);
      opacity: 0.92;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .archive-edition {
      color: #000000;
      font-family: Calibre, 'Avenir Next', 'Segoe UI', Arial, sans-serif;
      font-size: clamp(1rem, 1.2vw, 1.2rem);
      line-height: 1;
      letter-spacing: -0.015em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 8px;
      width: fit-content;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      height: 44px;
      padding: 0 14px;
      background: #f6db1f;
      border: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .archive-edition span {
      display: block;
      line-height: 1;
      transform: translateY(2px);
    }

    .archive-edition:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .archive-video {
      width: min(980px, 100%);
      display: grid;
      gap: 10px;
    }

    .archive-entry {
      display: grid;
      gap: 10px;
    }

    .archive-entry + .archive-entry {
      margin-top: 10px;
    }

    .archive-video-frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      display: block;
      background: #111;
    }

    .archive-video-link {
      color: #1f1f1f;
      text-decoration: none;
      font-size: clamp(0.9rem, 1vw, 1.02rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      width: fit-content;
    }

    .archive-video-link:hover {
      text-decoration: underline;
      text-underline-offset: 0.12em;
    }

    .site-footer {
      position: relative;
      z-index: 25;
      background: #d1c449;
      margin: auto -16px -16px;
      padding: 18px 22px 20px;
      font-family: Calibre, 'Avenir Next', 'Segoe UI', Arial, sans-serif;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      align-items: center;
      justify-content: start;
      width: min(980px, 100%);
      margin: 0 auto;
    }

    .footer-col {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 20px;
    }

    .site-footer a {
      color: #1f1f1f;
      text-decoration: none;
      text-transform: uppercase;
      font-size: clamp(1.05rem, 1.25vw, 1.35rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      text-shadow: none;
    }

    .site-footer a:hover {
      color: #000000;
    }

    .footer-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.32em;
      margin-top: 11px;
      width: min(980px, 100%);
      margin-left: auto;
      margin-right: auto;
      color: #1f1f1f;
      background: transparent;
      padding: 0;
      font-size: clamp(1.05rem, 1.25vw, 1.35rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      text-transform: uppercase;
    }

    .footer-meta .accent {
      color: #F6DB1F;
    }

    .footer-tickets {
      display: inline-flex;
      align-items: center;
      line-height: 0;
      position: relative;
      left: 10px;
      top: -5px;
    }

    .footer-tickets img {
      width: clamp(72px, 9.6vw, 112px);
      height: auto;
      display: block;
    }

    .menu-panel {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #7CB9A3;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 60;
    }

    .menu-open .menu-panel {
      display: flex;
    }

    .menu-panel nav {
      display: grid;
      gap: 0;
      width: 100%;
      text-align: center;
    }

    .menu-panel a {
      color: #F6DB1F;
      text-decoration: none;
      font-size: clamp(2rem, 6vw, 3.5rem);
      letter-spacing: -0.02em;
      padding: 18px 0 10px;
      border-bottom: 3px solid #5F659F;
      text-transform: uppercase;
      font-weight: 800;
    }

    .menu-panel a:hover {
      opacity: 0.7;
    }

    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      opacity: 0;
      pointer-events: none;
      z-index: 55;
    }

    .menu-open .scrim {
      opacity: 1;
      pointer-events: auto;
    }

    @media (max-width: 900px) {
      .topbar {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 0;
      }

      .topbar-actions {
        display: contents;
      }

      .top-nav {
        display: none;
      }

      .menu-toggle {
        display: inline-flex;
        justify-self: end;
      }

      .tickets,
      .home-cta {
        width: clamp(92px, 22vw, 118px);
      }

      .tickets {
        width: clamp(92px, 22vw, 118px);
      }

      .header-logo {
        display: none;
      }

      .header-kravka {
        display: none;
      }

      .menu-text {
        display: none;
      }

      .menu-logo {
        display: block;
        width: clamp(58px, 14.1vw, 75px);
        height: auto;
      }

      .menu-open .menu-logo {
        display: none;
      }

      .menu-open .menu-kravka {
        display: block;
        width: clamp(37px, 8.9vw, 48px);
        height: auto;
        margin-left: -25px;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .archive-shell {
        margin-top: 0;
      }

      .site-footer {
        margin: auto -12px -12px;
        padding: 16px 14px 16px;
      }

      .footer-grid {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .site-footer a {
        font-size: 0.96rem;
      }

      .footer-meta {
        font-size: 0.96rem;
        margin-top: 12px;
        padding: 0;
      }

      .topbar-actions {
        gap: 8px;
      }

      .tickets,
      .home-cta {
        width: clamp(84px, 24vw, 104px);
      }

      .tickets {
        width: clamp(84px, 24vw, 104px);
      }

      .header-logo {
        width: clamp(51px, 14.7vw, 64px);
      }
    }
  </style>
</head>

  <script>
    if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
    window.scrollTo(0, 0);

    const body = document.body;
    const toggle = document.getElementById('menuToggle');
    const panel = document.getElementById('menuPanel');
    const scrim = document.getElementById('scrim');

    function setMenu(open) {
      body.classList.toggle('menu-open', open);
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      panel.setAttribute('aria-hidden', open ? 'false' : 'true');
    }

    toggle.addEventListener('click', () => {
      const isOpen = body.classList.contains('menu-open');
      setMenu(!isOpen);
    });

    scrim.addEventListener('click', () => setMenu(false));

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') setMenu(false);
    });

    panel.querySelectorAll('a').forEach((link) => {
      link.addEventListener('click', () => setMenu(false));
    });
  </script>

  <button id="scroll-top" aria-label="Scroll to top" onclick="window.scrollTo({top:0,behavior:'smooth'})"><img src="images/Web Symbols + GIF/sipka_page_up-02.svg" alt="" style="height:auto;"></button>
  <style>
    #scroll-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
    }
    #scroll-top img { width: 8em; }
    #scroll-top.visible { opacity: 1; pointer-events: auto; }
    @media (max-width: 900px) { #scroll-top img { width: 5.3em; } }
  </style>
  <script>
    (function(){
      var btn = document.getElementById('scroll-top');
      window.addEventListener('scroll', function(){ btn.classList.toggle('visible', window.scrollY > 300); }, {passive:true});
    })();
  </script>
